services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: laurinha
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  evolution:
    image: atendai/evolution-api:latest
    ports:
      - '8090:8080'
    env_file:
      - ./evolution/.env
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

volumes:
  redis_data:
  pg_data:
  evolution_instances:
